<svg width="800" height="440" viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,sans-serif">
  <!-- bg -->
  <rect width="800" height="440" fill="#05090f"/>

  <!-- title area -->
  <text x="40" y="38" fill="#eaf4f8" font-size="15" font-weight="600" letter-spacing="-0.3">Middleware de Integração Industrial</text>
  <text x="40" y="56" fill="#415a6b" font-size="11" font-family="ui-monospace,monospace">CATECH Systems · Fluxo de dados em tempo real</text>
  <circle cx="756" cy="40" r="5" fill="#22c55e"/>
  <text x="766" y="44" fill="#22c55e" font-size="9" font-family="ui-monospace,monospace">ATIVO</text>

  <!-- divider -->
  <line x1="40" y1="70" x2="760" y2="70" stroke="#182030" stroke-width="1"/>

  <!-- LAYER 1: Chão de fábrica -->
  <text x="40" y="98" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace" letter-spacing="0.1em">CAMADA 1 — CHÃO DE FÁBRICA</text>

  <!-- Machine boxes -->
  <rect x="40" y="108" width="120" height="64" rx="6" fill="#0a1019" stroke="#182030" stroke-width="1"/>
  <text x="68" y="132" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">CLP</text>
  <text x="52" y="148" fill="#eaf4f8" font-size="11" font-weight="600">Máquina 01</text>
  <text x="52" y="162" fill="#22c55e" font-size="8" font-family="ui-monospace,monospace">Modbus RTU</text>

  <rect x="176" y="108" width="120" height="64" rx="6" fill="#0a1019" stroke="#182030" stroke-width="1"/>
  <text x="204" y="132" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">SENSOR</text>
  <text x="188" y="148" fill="#eaf4f8" font-size="11" font-weight="600">Sensores IoT</text>
  <text x="188" y="162" fill="#22c55e" font-size="8" font-family="ui-monospace,monospace">4-20mA / Digital</text>

  <rect x="312" y="108" width="120" height="64" rx="6" fill="#0a1019" stroke="#182030" stroke-width="1"/>
  <text x="340" y="132" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">SCADA</text>
  <text x="324" y="148" fill="#eaf4f8" font-size="11" font-weight="600">Supervisório</text>
  <text x="324" y="162" fill="#22c55e" font-size="8" font-family="ui-monospace,monospace">OPC-UA / PROFINET</text>

  <!-- arrows up from machines -->
  <line x1="100" y1="172" x2="100" y2="195" stroke="#1c7898" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="96,193 100,200 104,193" fill="#1c7898"/>
  <line x1="236" y1="172" x2="236" y2="195" stroke="#1c7898" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="232,193 236,200 240,193" fill="#1c7898"/>
  <line x1="372" y1="172" x2="372" y2="195" stroke="#1c7898" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="368,193 372,200 376,193" fill="#1c7898"/>

  <!-- LAYER 2: Gateway -->
  <text x="40" y="222" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace" letter-spacing="0.1em">CAMADA 2 — GATEWAY CATECH</text>

  <rect x="60" y="232" width="380" height="72" rx="6" fill="#0a1019" stroke="#1c7898" stroke-width="1.5"/>
  <rect x="60" y="232" width="380" height="22" rx="6" fill="#1c7898" opacity="0.12"/>
  <text x="76" y="248" fill="#1c7898" font-size="10" font-weight="600" font-family="ui-monospace,monospace">CATECH GATEWAY</text>
  <text x="300" y="248" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">IP54 · 24V DC · GSM/ETH</text>

  <!-- gateway internals -->
  <rect x="76" y="260" width="80" height="28" rx="3" fill="#182030"/>
  <text x="86" y="272" fill="#415a6b" font-size="8" font-family="ui-monospace,monospace">COLETA</text>
  <text x="86" y="283" fill="#eaf4f8" font-size="9">Modbus/OPC</text>

  <text x="166" y="277" fill="#1c7898" font-size="14">→</text>

  <rect x="186" y="260" width="80" height="28" rx="3" fill="#182030"/>
  <text x="196" y="272" fill="#415a6b" font-size="8" font-family="ui-monospace,monospace">PARSE</text>
  <text x="196" y="283" fill="#eaf4f8" font-size="9">JSON/MQTT</text>

  <text x="276" y="277" fill="#1c7898" font-size="14">→</text>

  <rect x="296" y="260" width="80" height="28" rx="3" fill="#182030"/>
  <text x="306" y="272" fill="#415a6b" font-size="8" font-family="ui-monospace,monospace">PUBLICA</text>
  <text x="306" y="283" fill="#eaf4f8" font-size="9">HTTPS/REST</text>

  <!-- label: 250ms -->
  <text x="380" y="280" fill="#415a6b" font-size="8" font-family="ui-monospace,monospace">250ms</text>

  <!-- arrow to API -->
  <line x1="440" y1="268" x2="510" y2="268" stroke="#1c7898" stroke-width="1.5"/>
  <polygon points="507,264 514,268 507,272" fill="#1c7898"/>

  <!-- LAYER 3: API -->
  <rect x="514" y="232" width="156" height="72" rx="6" fill="#0a1019" stroke="#182030" stroke-width="1"/>
  <text x="530" y="252" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">API REST</text>
  <text x="530" y="268" fill="#eaf4f8" font-size="12" font-weight="600">Middleware</text>
  <text x="530" y="283" fill="#415a6b" font-size="9">Node.js · Docker</text>
  <text x="530" y="296" fill="#22c55e" font-size="8" font-family="ui-monospace,monospace">4.823 req/h</text>

  <!-- arrow to ERP -->
  <line x1="592" y1="304" x2="592" y2="330" stroke="#1c7898" stroke-width="1.5"/>
  <polygon points="588,328 592,336 596,328" fill="#1c7898"/>

  <!-- LAYER 3: ERP -->
  <text x="40" y="354" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace" letter-spacing="0.1em">CAMADA 3 — ERP / BI</text>

  <rect x="456" y="364" width="140" height="52" rx="6" fill="#0a1019" stroke="#182030" stroke-width="1"/>
  <text x="472" y="384" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">ERP</text>
  <text x="472" y="400" fill="#eaf4f8" font-size="12" font-weight="600">TOTVS Protheus</text>
  <text x="472" y="412" fill="#22c55e" font-size="8" font-family="ui-monospace,monospace">sincronizado</text>

  <rect x="614" y="364" width="120" height="52" rx="6" fill="#0a1019" stroke="#182030" stroke-width="1"/>
  <text x="630" y="384" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">BI / RELATÓRIOS</text>
  <text x="630" y="400" fill="#eaf4f8" font-size="12" font-weight="600">Dashboard</text>
  <text x="630" y="412" fill="#22c55e" font-size="8" font-family="ui-monospace,monospace">tempo real</text>

  <!-- ERP to BI arrow -->
  <line x1="596" y1="390" x2="612" y2="390" stroke="#182030" stroke-width="1.5"/>
  <polygon points="610,387 617,390 610,393" fill="#182030"/>

  <!-- stats bottom left -->
  <rect x="40" y="340" width="380" height="100" rx="6" fill="#0a1019" stroke="#182030" stroke-width="1"/>
  <text x="56" y="360" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace" letter-spacing="0.08em">ESTATÍSTICAS DO FLUXO</text>
  <line x1="56" y1="368" x2="404" y2="368" stroke="#182030" stroke-width="1"/>

  <text x="56" y="385" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">Latência média</text>
  <text x="220" y="385" fill="#eaf4f8" font-size="9" font-family="ui-monospace,monospace">284ms ponta-a-ponta</text>

  <text x="56" y="402" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">Dados hoje</text>
  <text x="220" y="402" fill="#eaf4f8" font-size="9" font-family="ui-monospace,monospace">1.284.720 registros</text>

  <text x="56" y="419" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">Lançamentos ERP</text>
  <text x="220" y="419" fill="#eaf4f8" font-size="9" font-family="ui-monospace,monospace">0 manuais · 100% automático</text>

  <text x="56" y="432" fill="#415a6b" font-size="9" font-family="ui-monospace,monospace">Uptime gateway</text>
  <text x="220" y="432" fill="#22c55e" font-size="9" font-family="ui-monospace,monospace">99,94% (18 meses)</text>
</svg>
